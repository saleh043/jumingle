<!--
  Jumingle logo
  A flat, modern mark combining a WEBCAM (rounded body + lens) with a
  PALM TREE (leaves growing from the top). Brand colours:
    green #22C55E, blue #0EA5E9, dark #0B1220.
  Single SVG: scales perfectly and doubles as a favicon.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Jumingle logo">
  <defs>
    <linearGradient id="cam" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#0EA5E9"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#34D399"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>
  </defs>

  <!-- Palm leaves grow from the top of the webcam -->
  <g transform="translate(32 20)">
    <path d="M0,0 Q-7,-11 0,-23 Q7,-11 0,0 Z" transform="rotate(-72)" fill="#16A34A"/>
    <path d="M0,0 Q-7,-11 0,-23 Q7,-11 0,0 Z" transform="rotate(72)"  fill="#16A34A"/>
    <path d="M0,0 Q-7,-11 0,-23 Q7,-11 0,0 Z" transform="rotate(-38)" fill="url(#leaf)"/>
    <path d="M0,0 Q-7,-11 0,-23 Q7,-11 0,0 Z" transform="rotate(38)"  fill="url(#leaf)"/>
    <path d="M0,0 Q-7,-11 0,-23 Q7,-11 0,0 Z"                          fill="url(#leaf)"/>
  </g>

  <!-- short trunk linking the leaves to the webcam -->
  <rect x="30.5" y="18" width="3" height="16" rx="1.5" fill="#15803D"/>

  <!-- webcam body -->
  <rect x="13" y="30" width="38" height="27" rx="10" fill="url(#cam)"/>

  <!-- camera lens -->
  <circle cx="32" cy="43.5" r="10.5" fill="#0B1220"/>
  <circle cx="32" cy="43.5" r="7"  fill="#22C55E"/>
  <circle cx="32" cy="43.5" r="3"  fill="#0B1220"/>
  <circle cx="29.3" cy="40.8" r="1.8" fill="#FFFFFF" opacity="0.9"/>

  <!-- status light -->
  <circle cx="45" cy="35.5" r="1.7" fill="#FFFFFF"/>
</svg>
