<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Access blocked - Jumingle</title>
  <link rel="icon" href="/assets/favicon.svg" />
  <link rel="stylesheet" href="/css/style.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: {
      jgreen: '#22C55E', jblue: '#0EA5E9', jdark: '#0B1220', jpanel: '#111A2E', jborder: '#1E293B'
    } } } };
  </script>
</head>
<body class="bg-jdark text-slate-300 min-h-screen flex items-center justify-center p-6">
  <div class="bg-jpanel border border-jborder rounded-2xl max-w-md w-full p-8 text-center">
    <img src="/assets/logo.svg" class="w-14 h-14 mx-auto opacity-80" alt="Jumingle" />
    <h1 class="text-2xl font-bold text-white mt-4">Access blocked</h1>
    <p class="text-slate-400 mt-3">
      Your access to Jumingle has been restricted, usually because of a report or
      a breach of our community rules. Temporary restrictions lift automatically.
    </p>
    <p class="text-slate-500 text-sm mt-3">
      If you believe this is a mistake, please <a href="/contact.html" class="text-jgreen underline">contact us</a>.
    </p>
    <a href="/" class="inline-block mt-6 text-sm text-slate-400 hover:text-white">&larr; Back home</a>
  </div>
</body>
</html>
