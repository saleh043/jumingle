<!--
  Jumingle logo
  A flat, minimal mark that combines a WEBCAM (the body in the centre)
  with a PALM TREE (the leaves growing out of the top).
  Colours: green #22C55E, blue #0EA5E9, dark #111827.
  It is a single SVG so it scales perfectly and also works as a favicon.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Jumingle logo">

  <!-- Palm leaves grow from this point (the top of the webcam) -->
  <g transform="translate(32 20)">
    <!-- back leaves (slightly darker green for depth) -->
    <path d="M0,0 Q-7,-11 0,-23 Q7,-11 0,0 Z" transform="rotate(-72)" fill="#16A34A"/>
    <path d="M0,0 Q-7,-11 0,-23 Q7,-11 0,0 Z" transform="rotate(72)"  fill="#16A34A"/>
    <!-- front leaves (main green) -->
    <path d="M0,0 Q-7,-11 0,-23 Q7,-11 0,0 Z" transform="rotate(-38)" fill="#22C55E"/>
    <path d="M0,0 Q-7,-11 0,-23 Q7,-11 0,0 Z" transform="rotate(38)"  fill="#22C55E"/>
    <path d="M0,0 Q-7,-11 0,-23 Q7,-11 0,0 Z"                          fill="#22C55E"/>
  </g>

  <!-- short trunk linking the leaves to the webcam -->
  <rect x="30.5" y="18" width="3" height="16" rx="1.5" fill="#16A34A"/>

  <!-- webcam body -->
  <rect x="14" y="30" width="36" height="26" rx="9" fill="#0EA5E9"/>

  <!-- camera lens -->
  <circle cx="32" cy="43" r="10" fill="#FFFFFF"/>
  <circle cx="32" cy="43" r="6"  fill="#22C55E"/>
  <circle cx="29.5" cy="40.5" r="1.8" fill="#FFFFFF"/>

  <!-- little status light on the webcam -->
  <circle cx="44" cy="35" r="1.6" fill="#FFFFFF"/>
</svg>
