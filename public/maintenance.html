<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Be right back - Jumingle</title>
  <link rel="icon" href="/assets/favicon.svg" />
  <link rel="stylesheet" href="/css/style.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: {
      jgreen: '#22C55E', jblue: '#0EA5E9', jdark: '#0B1220', jpanel: '#111A2E', jborder: '#1E293B'
    } } } };
  </script>
</head>
<body class="bg-jdark text-slate-300 min-h-screen flex items-center justify-center p-6">
  <div class="bg-jpanel border border-jborder rounded-2xl max-w-md w-full p-8 text-center">
    <img src="/assets/logo.svg" class="w-14 h-14 mx-auto" alt="Jumingle" />
    <h1 class="text-2xl font-bold text-white mt-4">We'll be right back 🌴</h1>
    <p class="text-slate-400 mt-3">
      Jumingle is down for a little maintenance. We're making things better and
      will be back online shortly. Thanks for your patience!
    </p>
    <button onclick="location.reload()" class="mt-6 bg-jgreen text-jdark font-semibold px-6 py-3 rounded-xl hover:opacity-90">
      Try again
    </button>
  </div>
</body>
</html>
